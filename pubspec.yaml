name: toolkit_manager
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0                # API calls
  flutter_riverpod: ^2.5.1   # State management
  flutter_secure_storage: ^10.0.0  # JWT storage
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0     # .env support
  go_router: ^14.0.0         # Navigation
  mobile_scanner: ^3.5.5     # QR scanning 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
